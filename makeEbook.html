    <main>
    <h1 class="page-title">#makeEbook</h1>
    <div class="makeEbook-container">   
     <form id="epubForm" class="eBookform-container">
        <label for="title">Book Title:</label>
        <input type="text" id="title" name="title" required><br>
        
        <label for="author">Author:</label>
        <input type="text" id="author" name="author" required><br>
        
        <label for="description">Book Description:</label><br>
        <textarea id="description" name="description" required></textarea><br>

        <label for="date">Publishing Date:</label>
        <input type="date" id="date" name="date" required><br>

        <label for="language">Language:</label>
        <input type="text" id="language" name="language" value="en" required><br>

        <h2 class="result-title">Chapters</h2>
        <div id="chapters">
            <div class="chapter">
                <label for="chapterTitle1">Chapter 1 Title:</label>
                <input type="text" id="chapterTitle1" name="chapterTitle1" required><br>

                <label for="chapterContent1">Chapter 1 Content:</label><br>
                <textarea id="chapterContent1" name="chapterContent1" required></textarea><br>
            </div>
        </div>
        <!-- <button type="button" id="addChapter" class="calculate-btn">Add Chapter</button><br>
         -->
        <button type="button" id="generateEpub" class="calculate-btn"><i class="fa-solid fa-book-open-reader"></i> Generate ePub</button>
        </form>
    </div> 
</div> 
    </main>
    <script src="scripts.js"></script>
